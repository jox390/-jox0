<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- Premium Black Background -->
    <rect width="512" height="512" rx="120" fill="#050505"/>
    <defs>
        <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <!-- Modern Monogram JOX -->
    <!-- The futuristic 'J' (White) -->
    <path d="M160 140H270V320C270 347.614 247.614 370 220 370H190V310H210C215.523 310 220 305.523 220 300V200H160V140Z" fill="white"/>
    <!-- The Cyber 'X' Slash and 'O' Accent (Glowing Red) -->
    <path d="M380 140L240 370H300L440 140H380Z" fill="#FF0033" filter="url(#neonGlow)"/>
    <circle cx="310" cy="240" r="40" fill="none" stroke="#FF0033" stroke-width="10" stroke-opacity="0.6" filter="url(#neonGlow)"/>
</svg>